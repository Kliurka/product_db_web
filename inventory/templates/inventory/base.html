<!DOCTYPE html>
<html>
<head>
    <title>Stone Factory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4ef;
            color: #111;
        }

        .topbar {
            background: #111;
            color: white;
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 18px;
            gap: 24px;
        }

        .logo {
            font-weight: bold;
            letter-spacing: 4px;
        }

        .nav a {
            color: #aaa;
            text-decoration: none;
            margin-right: 18px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .nav a.active {
            color: #c6ff00;
            border-bottom: 2px solid #c6ff00;
            padding-bottom: 4px;
        }

        .user {
            margin-left: auto;
            font-size: 12px;
            border: 1px solid #777;
            padding: 5px;
        }

        .page {
            padding: 26px;
        }

        .subtitle {
            font-size: 11px;
            letter-spacing: 5px;
            color: #555;
            text-transform: uppercase;
        }

        h1 {
            margin: 8px 0 4px 0;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            margin: 22px 0 14px 0;
        }

        input, select, button {
            padding: 9px;
            border: 2px solid #111;
            background: white;
        }

        .search {
            flex: 1;
        }

        .btn-dark {
            background: #111;
            color: white;
            font-weight: bold;
        }

        .btn-green {
            background: #c6ff00;
            color: #111;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border: 3px solid #111;
            font-size: 13px;
        }

        th {
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid #111;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        tr:nth-child(even) {
            background: #f0f0ea;
        }

        .code {
            font-weight: bold;
            border: 1px solid #aaa;
            padding: 3px 6px;
            text-decoration: none;
            color: #111;
            background: #eee;
        }

        .status {
            font-weight: bold;
            padding: 4px 7px;
            border: 1px solid #111;
            font-size: 11px;
            text-transform: uppercase;
        }

        .available { background: #c6ff00; }
        .reserved { background: orange; }
        .sold { background: #6ec6ff; }
        .damaged { background: #ff3b30; color: white; }
        .archived { background: #111; color: white; }

        @media (max-width: 800px) {
            .hide-mobile {
                display: none;
            }

            .toolbar {
                flex-direction: column;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px;
            }
            }
                    th a {
                color: inherit;
                text-decoration: underline;
                font-weight: inherit;
            }

            th a:hover {
                color: inherit;
            }

            .sort-arrow {
                margin-left: 4px;
                font-weight: bold;
            }
            .sort-link {
                color: inherit;
                text-decoration: underline;
                font-weight: inherit;
            }

            .sort-link:hover {
                color: inherit;
            }

            .sort-link.active {
                font-weight: bold;
            }

            .sort-link span {
                margin-left: 4px;
            }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">STONE FACTORY</div>
    <div class="nav">
        <a href="/products/" class="active">Products</a>
        <a href="/orders/">Orders</a>
        <a href="#">Reports</a>
        <a href="/admin/">Admin</a>
    </div>
    <div class="user">{{ request.user.username|default:"USER" }}</div>
</div>

{% block content %}
{% endblock %}

</body>
</html>
