<!DOCTYPE html>
<html>
<head>
    <title>{{ product.code }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<h1>{{ product.name }}</h1>

<p><b>Code:</b> {{ product.code }}</p>
<p><b>Texture:</b> {{ product.texture }}</p>
<p><b>Location:</b> {{ product.storage_location }}</p>
<p><b>Size:</b> {{ product.dimension_x }} x {{ product.dimension_y }}</p>
<p><b>Price:</b> {{ product.price }}</p>
<p><b>Status:</b> {{ product.status }}</p>

<p><a href="/scan/">Scan again</a></p>

</body>
</html>
